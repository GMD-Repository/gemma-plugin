; ---------------------------------------------------------------------------
; pb_tool.cfg — Create Enumeration Areas QGIS Plugin
; ---------------------------------------------------------------------------
; pb_tool reads this file from the PLUGIN ROOT (ea_delineation/) directory.
; Run from inside ea_delineation/: pb_tool deploy
; Or use the repo-root helper:     .\deploy.ps1
;
; Install pb_tool: pip install pb_tool
; Docs: https://g-sherman.github.io/plugin_build_tool/

[plugin]
; Must match the plugin folder name exactly — this becomes the deployed
; folder name under %APPDATA%\QGIS\QGIS3\profiles\default\python\plugins\
name: ea_delineation

[files]
; All Python source files to deploy (space-separated, relative to plugin root)
python_files: __init__.py plugin.py provider.py algorithm.py dialog.py

; Non-Python files to include alongside the Python files
extras: metadata.txt icon.png

; No .ui or .qrc files in this plugin (no Qt Designer forms or resource files)
compiled_ui_files:
resource_files:
extra_dirs:
locales:

[help]
; No built HTML help directory
dir:
target:
