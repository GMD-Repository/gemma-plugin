name: Publish Preview Release

on:
  push:
    branches:
      - main
      - beta
      - dev
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-release-preview:
    name: Build & Release Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PREVIEW_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Calculate Revision Number
        id: rev
        run: |
          REVISION=$(git rev-list --count HEAD)
          echo "revision=r${REVISION}" >> $GITHUB_OUTPUT
          echo "rev_num=${REVISION}" >> $GITHUB_OUTPUT
          echo "Calculated revision: r${REVISION}"

      - name: Package QGIS Plugin ZIP & Update Preview Metadata
        id: package
        uses: actions/github-script@v7
        env:
          REVISION: ${{ steps.rev.outputs.revision }}
          BRANCH_NAME: ${{ github.ref_name }}
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const revision = process.env.REVISION;
            const branch   = process.env.BRANCH_NAME;
            const zipName  = `gemma-plugin-${revision}.zip`;
            const rawZip   = 'raw_preview.zip';

            // 1. Create initial zip of repo
            execSync(`zip -r "${rawZip}" . -x "*.git*" "*.github*" "docs/*" ".antigravity*" "node_modules/*" "*.zip" "__pycache__/*" "*.pyc" "package.json" "pnpm-lock.yaml" "tsconfig*.json" ".agents/*"`);

            // 2. Unzip into temporary folder
            const tmpDir = `_tmp_plugin_${Date.now()}`;
            fs.mkdirSync(`${tmpDir}/gemma-plugin`, { recursive: true });
            execSync(`unzip -q "${rawZip}" -d "${tmpDir}/gemma-plugin"`);
            fs.unlinkSync(rawZip);

            // 3. Modify metadata.txt inside plugin folder
            const metaPath = `${tmpDir}/gemma-plugin/metadata.txt`;
            let metaContent = fs.readFileSync(metaPath, 'utf8');

            const vMatch = metaContent.match(/^version=(.*)$/m);
            const baseVersion = vMatch ? vMatch[1].trim() : '3.0.0';
            const previewVersion = `${baseVersion}-${revision}`;

            let commitMsg = '';
            try {
              commitMsg = execSync('git log -1 --pretty=format:"%s"').toString().trim();
            } catch (e) {
              commitMsg = 'Automated preview release';
            }

            // Update plugin name to GEMMA (Beta) and version to base-revision (e.g. 3.0.0-r124)
            metaContent = metaContent.replace(/^name=.*$/m, 'name=GEMMA (Beta)');
            metaContent = metaContent.replace(/^version=.*$/m, `version=${previewVersion}`);

            // Prepend preview changelog entry
            const previewChangelog = `${previewVersion}: Preview build ${revision} [${branch}] - ${commitMsg}`;
            metaContent = metaContent.replace(/^changelog=/m, `changelog=${previewChangelog}\n    `);

            fs.writeFileSync(metaPath, metaContent, 'utf8');
            console.log(`✅ Packaged metadata.txt updated: name=GEMMA (Beta), version=${previewVersion}`);

            // 4. Create final plugin ZIP
            execSync(`cd "${tmpDir}" && zip -r "../${zipName}" gemma-plugin/`);
            fs.rmSync(tmpDir, { recursive: true, force: true });

            core.setOutput('zip_name', zipName);
            core.setOutput('preview_version', previewVersion);

      - name: Publish to Preview Repository
        uses: actions/github-script@v7
        env:
          REVISION: ${{ steps.rev.outputs.revision }}
          ZIP_NAME: ${{ steps.package.outputs.zip_name }}
          BRANCH_NAME: ${{ github.ref_name }}
        with:
          github-token: ${{ secrets.PREVIEW_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const revision  = process.env.REVISION;
            const zipName   = process.env.ZIP_NAME;
            const branch    = process.env.BRANCH_NAME;
            const owner     = 'GMD-Repository';
            const repo      = 'gemma-plugin-preview';

            const releaseBody = [
              `## 🚀 GEMMA Preview Build (${revision})`,
              '',
              `Automated preview release generated from branch \`${branch}\`.`,
              '',
              '### Installation:',
              `1. Download \`${zipName}\` below.`,
              '2. Open QGIS → **Plugins** → **Manage and Install Plugins** → **Install from ZIP**.',
              '3. Select the downloaded ZIP file and click **Install Plugin**.',
            ].join('\n');

            // Create the release via GitHub API — prerelease: false, make_latest: true
            const { data: release } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name:    revision,
              name:        `GEMMA Preview ${revision}`,
              body:        releaseBody,
              draft:       false,
              prerelease:  false,
              make_latest: 'true',
            });

            console.log(`✅ Release created: ${release.html_url}`);
            console.log(`   prerelease: ${release.prerelease}`);

            // Upload ZIP as release asset
            const zipBuffer = fs.readFileSync(zipName);
            await github.rest.repos.uploadReleaseAsset({
              owner,
              repo,
              release_id: release.id,
              name:       zipName,
              data:       zipBuffer,
            });

            console.log(`✅ ZIP uploaded: ${zipName}`);

      # ── Generate beta channel files for QGIS repository ──────────────
      - name: Generate beta channel files
        id: beta-files
        uses: actions/github-script@v7
        env:
          REVISION: ${{ steps.rev.outputs.revision }}
          ZIP_NAME: ${{ steps.package.outputs.zip_name }}
          PREVIEW_VERSION: ${{ steps.package.outputs.preview_version }}
        with:
          script: |
            const fs = require('fs');

            const revision       = process.env.REVISION;
            const zipName        = process.env.ZIP_NAME;
            const previewVersion = process.env.PREVIEW_VERSION;
            const today          = new Date().toISOString().split('T')[0];
            const previewOwner   = 'GMD-Repository';
            const previewRepo    = 'gemma-plugin-preview';
            const baseUrl        = 'https://gmd-repository.github.io/gemma-plugin';

            // ── Read metadata.txt for QGIS info ─────────────
            const metadata = fs.readFileSync('metadata.txt', 'utf8');
            const getField = (key) => {
              const m = metadata.match(new RegExp(`^${key}=(.*)$`, 'm'));
              return m ? m[1].trim() : '';
            };

            const versionStr = previewVersion.startsWith('v') ? previewVersion : `v${previewVersion}`;
            const downloadUrl = `https://github.com/${previewOwner}/${previewRepo}/releases/download/${revision}/${zipName}`;
            const releaseUrl  = `https://github.com/${previewOwner}/${previewRepo}/releases/tag/${revision}`;

            // ── 1. Generate gemma-beta.xml ──────────────────
            const gemmaBetaXml = `<?xml version="1.0" encoding="UTF-8"?>
            <?xml-stylesheet type="text/xsl" href=""?>
            <plugins>
              <pyqgis_plugin name="${getField('name')} (Beta)" version="${versionStr}">
                <version>${versionStr}</version>
                <description>${getField('description')} (Beta)</description>
                <about>${getField('about').replace(/&/g, '&amp;').replace(/</g, '&lt;')} (Beta Channel)</about>
                <author>${getField('author')}</author>
                <author_name>${getField('author')}</author_name>
                <qgis_minimum_version>${getField('qgisMinimumVersion')}</qgis_minimum_version>
                <homepage>${baseUrl}/</homepage>
                <download_url>${downloadUrl}</download_url>
                <icon>${baseUrl}/icons/icon.png</icon>
                <file_name>${zipName}</file_name>
                <upload_date>${today}</upload_date>
                <update_date>${today}</update_date>
                <experimental>True</experimental>
                <deprecated>${getField('deprecated')}</deprecated>
                <tracker>https://github.com/${previewOwner}/gemma-plugin/issues</tracker>
                <repository>https://github.com/${previewOwner}/gemma-plugin</repository>
                <tags>${getField('tags')},beta</tags>
                <category>${getField('category')}</category>
                <server>${getField('server')}</server>
              </pyqgis_plugin>
            </plugins>`.replace(/^            /gm, '');

            fs.writeFileSync('docs/user-guide/public/gemma-beta.xml', gemmaBetaXml);
            console.log('✅ gemma-beta.xml generated with preview repo URLs');
            console.log(`   Download URL: ${downloadUrl}`);
            console.log(`   Version: ${versionStr}`);

            // ── 2. Generate latest-beta.json ────────────────
            const latestBetaJson = {
              version: previewVersion,
              tag: revision,
              releaseDate: today,
              repositoryUrl: `${baseUrl}/gemma-beta.xml`,
              downloadUrl,
              releaseUrl,
              changelogUrl: `${baseUrl}/changelog/${revision}`
            };

            fs.writeFileSync('docs/user-guide/public/latest-beta.json', JSON.stringify(latestBetaJson, null, 2));
            console.log('✅ latest-beta.json generated');

      # ── Commit beta channel files back to repo ───────────────────────
      - name: Commit beta channel files directly
        env:
          GH_TOKEN: ${{ secrets.PREVIEW_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/user-guide/public/gemma-beta.xml docs/user-guide/public/latest-beta.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update beta channel files for preview ${{ steps.rev.outputs.revision }}" && git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git HEAD:main)

      # ── Trigger Deploy VitePress Docs ────────────────────────────────
      - name: Trigger GitHub Pages Deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PREVIEW_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'deploy-docs.yml',
                ref: 'main',
              });
              console.log('🚀 Triggered Deploy VitePress Docs workflow');
            } catch (err) {
              console.log('⚠️ Could not trigger deploy-docs dispatch:', err.message);
            }


